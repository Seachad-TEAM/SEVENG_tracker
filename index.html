<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEVEN-G Action Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  :root {
    --navy: #0a1628;
    --navy2: #0f1f3d;
    --navy3: #162847;
    --gold: #f0b429;
    --white: #f5f3ee;
    --gray1: #e8e5df;
    --gray2: #b8b4ac;
    --gray3: #6b6760;
    --red: #c0392b;
    --red-light: #fdecea;
    --green: #1a6b3c;
    --green-light: #e8f5ee;
    --blue: #1a4a8a;
    --blue-light: #e8f0fc;
    --amber-light: #fef3dc;
    --amber-dark: #7a4f00;
    --border: #d4d0c8;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--white); color: var(--navy); min-height: 100vh; }

  /* TOPBAR */
  .topbar {
    background: var(--navy2); color: #fff;
    padding: 0 24px; height: 52px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 50;
    border-bottom: 2px solid var(--gold);
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .logo {
    width: 32px; height: 32px; background: var(--gold);
    border-radius: 6px; display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 9px; font-weight: 500; color: var(--navy2); letter-spacing: .5px;
  }
  .proj-label { font-size: 10px; opacity: .5; letter-spacing: 1px; text-transform: uppercase; }
  .proj-name { font-size: 14px; font-weight: 500; }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .progress-pct { font-size: 11px; opacity: .6; font-family: var(--mono); text-align: right; }
  .progress-bar { width: 80px; height: 2px; background: rgba(255,255,255,.15); border-radius: 2px; margin-top: 3px; }
  .progress-fill { height: 2px; background: var(--gold); border-radius: 2px; transition: width .4s; }
  .btn-top {
    font-size: 11px; padding: 4px 10px;
    border: 1px solid rgba(255,255,255,.25); background: transparent; color: #fff;
    border-radius: 4px; cursor: pointer; font-family: var(--sans);
  }
  .btn-top:hover { background: rgba(255,255,255,.08); }

  /* SPLASH / PROJECT SELECTOR */
  .splash {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: calc(100vh - 52px);
    gap: 20px; padding: 2rem;
  }
  .splash-logo {
    width: 72px; height: 72px; background: var(--navy2);
    border-radius: 16px; display: flex; align-items: center; justify-content: center;
    border: 2px solid var(--gold);
  }
  .splash-logo span { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--gold); }
  .splash h1 { font-size: 22px; font-weight: 300; letter-spacing: -.3px; }
  .splash p { font-size: 14px; color: var(--gray3); }
  .splash-box {
    width: 100%; max-width: 400px;
    background: #fff; border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden;
  }
  .splash-box-header {
    padding: 12px 16px; background: var(--gray1);
    font-size: 11px; color: var(--gray3);
    text-transform: uppercase; letter-spacing: .8px;
    border-bottom: 1px solid var(--border);
  }
  .proj-list { max-height: 220px; overflow-y: auto; }
  .proj-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px; cursor: pointer;
    border-bottom: 1px solid var(--gray1);
    transition: background .12s;
  }
  .proj-item:last-child { border-bottom: none; }
  .proj-item:hover { background: var(--gray1); }
  .proj-item-left { display: flex; flex-direction: column; gap: 2px; }
  .proj-item-name { font-size: 14px; font-weight: 400; }
  .proj-item-meta { font-size: 11px; color: var(--gray3); font-family: var(--mono); }
  .proj-item-del {
    background: transparent; border: none; cursor: pointer;
    color: var(--gray2); font-size: 14px; padding: 2px 6px; border-radius: 3px;
  }
  .proj-item-del:hover { color: var(--red); background: var(--red-light); }
  .proj-empty { padding: 20px 16px; font-size: 13px; color: var(--gray3); text-align: center; }
  .new-proj-row {
    display: flex; gap: 0;
    border-top: 1px solid var(--border);
  }
  .new-proj-row input {
    flex: 1; font-family: var(--sans); font-size: 13px;
    padding: 10px 14px; border: none; outline: none; background: #fff;
  }
  .new-proj-row button {
    padding: 10px 16px; background: var(--navy2); color: #fff;
    border: none; cursor: pointer; font-family: var(--sans); font-size: 13px;
    white-space: nowrap;
  }
  .new-proj-row button:hover { background: var(--navy3); }
  .import-row {
    border-top: 1px solid var(--border);
    padding: 10px 12px 12px;
    background: #fff;
  }
  .import-row button {
    width: 100%; padding: 9px 12px;
    background: transparent; color: var(--gray3);
    border: 1px solid var(--border); border-radius: 4px;
    cursor: pointer; font-family: var(--sans); font-size: 13px;
  }
  .import-row button:hover { border-color: var(--navy2); color: var(--navy2); }

  /* STATS */
  .stats {
    display: grid; grid-template-columns: repeat(5,1fr);
    gap: 1px; background: var(--border);
    border-bottom: 1px solid var(--border);
  }
  .stat { background: var(--white); padding: 14px 20px; text-align: center; }
  .stat-num { font-size: 26px; font-weight: 300; font-family: var(--mono); }
  .stat-lbl { font-size: 10px; color: var(--gray3); letter-spacing: .8px; text-transform: uppercase; margin-top: 2px; }
  .n-todo{color:var(--amber-dark)} .n-prog{color:var(--blue)} .n-done{color:var(--green)} .n-blk{color:var(--red)}

  /* FILTERS */
  .filters {
    padding: 10px 24px; display: flex; flex-wrap: wrap; gap: 10px;
    align-items: center; border-bottom: 1px solid var(--border); background: #fff;
  }
  .fg { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
  .fg-lbl { font-size: 11px; color: var(--gray3); text-transform: uppercase; letter-spacing: .8px; margin-right: 2px; white-space: nowrap; }
  .chip {
    font-size: 11px; padding: 3px 10px; border-radius: 20px;
    border: 1px solid var(--border); cursor: pointer;
    background: transparent; color: var(--gray3); font-family: var(--sans);
    transition: all .12s;
  }
  .chip.active { background: var(--navy2); color: #fff; border-color: var(--navy2); }
  .chip:hover:not(.active) { border-color: var(--navy2); color: var(--navy2); }

  /* TOOLBAR */
  .toolbar {
    padding: 10px 24px; display: flex; align-items: center;
    justify-content: space-between; background: var(--white);
  }
  .toolbar-left { display: flex; gap: 8px; }
  .btn-add {
    font-size: 12px; padding: 6px 14px;
    background: var(--navy2); color: #fff;
    border: none; border-radius: 4px; cursor: pointer; font-family: var(--sans);
  }
  .btn-add:hover { background: var(--navy3); }
  .btn-cats {
    font-size: 12px; padding: 6px 12px;
    background: transparent; color: var(--gray3);
    border: 1px solid var(--border); border-radius: 4px; cursor: pointer; font-family: var(--sans);
  }
  .btn-cats:hover { border-color: var(--navy2); color: var(--navy2); }
  .count { font-size: 12px; color: var(--gray3); font-family: var(--mono); }

  /* FORM */
  .form-panel {
    margin: 0 24px 12px;
    border: 1px solid var(--border); border-radius: 6px;
    padding: 16px; background: #fff;
  }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .compact-fields {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: 1.2fr .9fr 1.2fr 1fr .95fr;
    gap: 12px;
    align-items: end;
  }
  .ff { grid-column: 1/-1; }
  .fr { display: flex; flex-direction: column; gap: 5px; }
  .fl { font-size: 11px; color: var(--gray3); text-transform: uppercase; letter-spacing: .6px; }
  .fl .req { color: var(--red); }
  .form-grid input, .form-grid select, .form-grid textarea {
    font-family: var(--sans); font-size: 13px; padding: 7px 10px;
    border: 1px solid var(--border); border-radius: 4px;
    background: var(--white); color: var(--navy); outline: none; width: 100%;
  }
  .form-grid input:focus, .form-grid select:focus, .form-grid textarea:focus {
    border-color: var(--navy2); background: #fff;
  }
  .prompt-ta { font-family: var(--mono) !important; font-size: 12px !important; line-height: 1.6; resize: vertical; }
  .form-actions { display: flex; gap: 8px; margin-top: 8px; }
  .btn-save {
    padding: 6px 16px; background: var(--navy2); color: #fff;
    border: none; border-radius: 4px; cursor: pointer; font-family: var(--sans); font-size: 13px;
  }
  .btn-save:hover { background: var(--navy3); }
  .btn-cancel {
    padding: 6px 12px; background: transparent;
    border: 1px solid var(--border); border-radius: 4px;
    cursor: pointer; font-family: var(--sans); font-size: 13px; color: var(--gray3);
  }
  .btn-cancel:hover { border-color: var(--navy2); color: var(--navy2); }

  /* TABLE */
  .tbl-wrap { padding: 0 24px 80px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { background: var(--navy2); }
  th {
    color: rgba(255,255,255,.7); padding: 9px 12px; text-align: left;
    font-size: 10px; font-weight: 500; letter-spacing: .8px;
    text-transform: uppercase; white-space: nowrap;
  }
  td { padding: 9px 12px; border-bottom: 1px solid var(--gray1); vertical-align: middle; }
  tr:hover td { background: #fafaf8; }
  .task-row-overdue td { background: var(--red-light); }
  .task-row-warning td { background: var(--amber-light); }
  .task-row-ontrack td { background: var(--green-light); }
  .task-row-overdue:hover td { background: #f9dfdc; }
  .task-row-warning:hover td { background: #fbe9bf; }
  .task-row-ontrack:hover td { background: #dceddf; }
  .action-name { font-size: 13px; }
  .action-note { font-size: 11px; color: var(--gray3); margin-top: 2px; }

  .badge { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
  .b-todo{background:var(--amber-light);color:var(--amber-dark)}
  .b-prog{background:var(--blue-light);color:var(--blue)}
  .b-done{background:var(--green-light);color:var(--green)}
  .b-blk{background:var(--red-light);color:var(--red)}
  .b-cat{background:var(--gray1);color:var(--gray3);font-size:10px}
  .b-alta{background:var(--red-light);color:var(--red)}
  .b-media{background:var(--amber-light);color:var(--amber-dark)}
  .b-baja{background:var(--green-light);color:var(--green)}

  .row-btns { display: flex; gap: 4px; align-items: center; }
  .btn-ver {
    font-size: 11px; padding: 3px 8px; border: 1px solid var(--border);
    border-radius: 4px; cursor: pointer; background: #fff; color: var(--gray3);
    font-family: var(--sans); white-space: nowrap; transition: all .12s;
  }
  .btn-ver:hover:not(:disabled) { border-color: var(--navy2); color: var(--navy2); }
  .btn-ver:disabled { opacity: .35; cursor: default; }

  .op { background: transparent; border: none; cursor: pointer; font-size: 13px; padding: 2px 4px; color: var(--gray2); border-radius: 3px; }
  .op:hover { color: var(--navy); background: var(--gray1); }
  .op-del:hover { color: var(--red); background: var(--red-light); }
  .empty { text-align: center; padding: 48px; color: var(--gray3); font-size: 14px; }

  /* FOOTER */
  .foot {
    padding: 12px 24px; display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; color: var(--gray3); border-top: 1px solid var(--border);
    background: #fff; position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;
  }
  .fbtns { display: flex; gap: 12px; }
  .fbtns button { font-size: 12px; background: transparent; border: none; cursor: pointer; color: var(--gray3); font-family: var(--sans); }
  .fbtns button:hover { color: var(--navy); }
  .fbtns .btn-reset:hover { color: var(--red); }

  /* OVERLAY / MODALS */
  .overlay {
    position: fixed; inset: 0; background: rgba(10,22,40,.55);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; backdrop-filter: blur(2px);
  }
  .modal {
    background: #fff; border-radius: 8px; padding: 24px;
    width: 580px; max-width: 95vw; max-height: 85vh; overflow-y: auto;
    border: 1px solid var(--border); box-shadow: 0 8px 40px rgba(10,22,40,.15);
  }
  .modal-sm { width: 400px; }
  .modal-title { font-size: 16px; font-weight: 500; margin-bottom: 4px; }
  .modal-meta { display: flex; gap: 6px; margin-bottom: 14px; margin-top: 6px; }
  .prompt-display {
    background: var(--navy); color: #e8f0fc; border-radius: 6px; padding: 16px;
    font-family: var(--mono); font-size: 12px; line-height: 1.7;
    white-space: pre-wrap; word-break: break-word; max-height: 300px; overflow-y: auto;
  }
  .modal-hint {
    font-size: 11px; color: var(--gray3); margin-top: 10px; line-height: 1.6;
    padding: 8px 12px; background: var(--gray1); border-radius: 4px;
  }
  .modal-hint strong { color: var(--navy); }
  .modal-actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; align-items: center; }
  .btn-copy {
    padding: 7px 14px; background: transparent; border: 1px solid var(--border);
    border-radius: 4px; cursor: pointer; font-family: var(--sans); font-size: 13px; color: var(--gray3);
  }
  .btn-copy:hover { border-color: var(--navy2); color: var(--navy2); }
  .btn-copy.copied { border-color: var(--green); color: var(--green); }

  .btn-close {
    padding: 7px 12px; background: transparent; border: 1px solid var(--border);
    border-radius: 4px; cursor: pointer; font-family: var(--sans); font-size: 13px; color: var(--gray3); margin-left: auto;
  }
  .btn-close:hover { border-color: var(--navy2); color: var(--navy2); }
  .no-prompt-msg { text-align: center; padding: 24px; color: var(--gray3); font-size: 13px; background: var(--gray1); border-radius: 6px; }
  .mbtns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .btn-danger { padding: 6px 14px; background: var(--red); color: #fff; border: none; border-radius: 4px; cursor: pointer; font-family: var(--sans); font-size: 13px; }
  .btn-danger:hover { opacity: .9; }

  /* CATEGORIES MODAL */
  .cats-list { display: flex; flex-direction: column; gap: 6px; margin: 14px 0; max-height: 260px; overflow-y: auto; }
  .cat-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px; background: var(--gray1); border-radius: 4px;
  }
  .cat-item-name { font-size: 13px; }
  .cat-item-del {
    background: transparent; border: none; cursor: pointer;
    color: var(--gray2); font-size: 13px; padding: 2px 6px; border-radius: 3px;
  }
  .cat-item-del:hover { color: var(--red); background: var(--red-light); }
  .cat-item-del:disabled { opacity: .3; cursor: default; }
  .new-cat-row { display: flex; gap: 8px; margin-top: 8px; }
  .new-cat-row input {
    flex: 1; font-family: var(--sans); font-size: 13px; padding: 7px 10px;
    border: 1px solid var(--border); border-radius: 4px; outline: none;
  }
  .new-cat-row input:focus { border-color: var(--navy2); }
  .new-cat-row button {
    padding: 7px 14px; background: var(--navy2); color: #fff; border: none;
    border-radius: 4px; cursor: pointer; font-family: var(--sans); font-size: 13px;
  }
  .new-cat-row button:hover { background: var(--navy3); }
  .cat-warning { font-size: 11px; color: var(--gray3); margin-top: 6px; }

  @media (max-width: 1100px) {
    .compact-fields { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  }

  @media (max-width: 700px) {
    .stats { grid-template-columns: repeat(3,1fr); }
    .form-grid { grid-template-columns: 1fr; }
    .compact-fields { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .ff { grid-column: 1; }
    .tbl-wrap, .filters, .toolbar, .foot { padding-left: 12px; padding-right: 12px; }
  }

  @media (max-width: 520px) {
    .compact-fields { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── Storage keys ──────────────────────────────────────────────────
const ROOT_KEY    = 'seveng_v5_root';      // { projectList: [...names] }
const projKey     = n => `seveng_v5_proj_${n}`;  // { actions, nextId, categories }

const DEFAULT_CATS = ['Análisis','Backend','Frontend','Infraestructura','Testing','Reunión','Documentación','Revisión','Despliegue','Otro'];
const PRIS  = ['Alta','Media','Baja'];
const ESTS  = ['To Do','In Progress','Done','Blocked'];

// ── State ─────────────────────────────────────────────────────────
let projectList = [];   // all project names
let project     = null; // current project name
let actions     = [];
let categories  = [...DEFAULT_CATS];
let nextId      = 1;
let formPrefs   = { categoria:'', responsable:'' };

let filterCat   = 'Todos';
let filterEst   = 'Todos';
let showForm    = false;
let editId      = null;
let confirmDel  = null;
let modalPrompt = null;
let showCatsMgr = false;
let showProjSel = false;

let form = { accion:'', categoria:'', prioridad:'Media', responsable:'', fin:'', estado:'To Do', prompt:'', notas:'' };

// ── Persistence ───────────────────────────────────────────────────
function loadRoot() {
  try {
    const d = JSON.parse(localStorage.getItem(ROOT_KEY) || 'null');
    if (d && d.projectList) projectList = d.projectList;
  } catch(e) {}
}
function saveRoot() {
  try { localStorage.setItem(ROOT_KEY, JSON.stringify({ projectList })); } catch(e) {}
}
function loadProject(name) {
  try {
    const d = JSON.parse(localStorage.getItem(projKey(name)) || 'null');
    if (d) {
      actions    = d.actions    || [];
      nextId     = d.nextId     || 1;
      categories = d.categories || [...DEFAULT_CATS];
      formPrefs  = resolveStoredFormPrefs(d.formPrefs, actions, categories);
    } else {
      actions    = [];
      nextId     = 1;
      categories = [...DEFAULT_CATS];
      formPrefs  = { categoria:'', responsable:'' };
    }
  } catch(e) { actions=[]; nextId=1; categories=[...DEFAULT_CATS]; formPrefs={ categoria:'', responsable:'' }; }
}
function saveProject() {
  if (!project) return;
  try { localStorage.setItem(projKey(project), JSON.stringify({ actions, nextId, categories, formPrefs })); } catch(e) {}
}
function getProjectSnapshot(name) {
  try {
    const d = JSON.parse(localStorage.getItem(projKey(name)) || 'null');
    if (d) {
      return {
        actions: d.actions || [],
        nextId: d.nextId || 1,
        categories: d.categories || [...DEFAULT_CATS]
      };
    }
  } catch(e) {}
  return { actions: [], nextId: 1, categories: [...DEFAULT_CATS] };
}

loadRoot();

// ── Helpers ───────────────────────────────────────────────────────
const esc = s => !s ? '' : String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const sc  = s => s==='To Do'?'b-todo':s==='In Progress'?'b-prog':s==='Done'?'b-done':s==='Blocked'?'b-blk':'';
const sp  = p => p==='Alta'?'b-alta':p==='Media'?'b-media':'b-baja';

function getTodayDateValue() {
  const now = new Date();
  const year = now.getFullYear();
  const month = String(now.getMonth() + 1).padStart(2, '0');
  const day = String(now.getDate()).padStart(2, '0');
  return `${year}-${month}-${day}`;
}

function parseDateValue(value) {
  if (!value) return null;
  const parts = String(value).split('-').map(Number);
  if (parts.length !== 3 || parts.some(Number.isNaN)) return null;
  const [year, month, day] = parts;
  return new Date(year, month - 1, day);
}

function getTaskDeadlineState(fin) {
  const dueDate = parseDateValue(fin);
  if (!dueDate) return '';

  const dueDateEnd = new Date(dueDate);
  dueDateEnd.setHours(23, 59, 59, 999);

  const now = new Date();
  const remainingMs = dueDateEnd.getTime() - now.getTime();
  if (remainingMs < 0) return 'task-row-overdue';
  if (remainingMs < 24 * 60 * 60 * 1000) return 'task-row-warning';
  return 'task-row-ontrack';
}

function resolveStoredFormPrefs(storedPrefs, storedActions, storedCategories) {
  try {
    const safeCategories = Array.isArray(storedCategories) ? storedCategories : [...DEFAULT_CATS];
    const safeActions = Array.isArray(storedActions) ? storedActions : [];
    const lastCategoria = (() => {
      for (let index = safeActions.length - 1; index >= 0; index--) {
        const value = String(safeActions[index]?.categoria || '').trim();
        if (value && safeCategories.includes(value)) return value;
      }
      return '';
    })();
    const lastResponsable = (() => {
      for (let index = safeActions.length - 1; index >= 0; index--) {
        const value = String(safeActions[index]?.responsable || '').trim();
        if (value) return value;
      }
      return '';
    })();

    return {
      categoria: storedPrefs && typeof storedPrefs.categoria === 'string' && safeCategories.includes(storedPrefs.categoria)
        ? storedPrefs.categoria
        : lastCategoria,
      responsable: storedPrefs && typeof storedPrefs.responsable === 'string'
        ? storedPrefs.responsable.trim() || lastResponsable
        : lastResponsable
    };
  } catch (error) {
    return { categoria:'', responsable:'' };
  }
}

function createInitialFormState() {
  const categoria = categories.includes(formPrefs.categoria) ? formPrefs.categoria : '';
  return {
    accion: '',
    categoria,
    prioridad: 'Media',
    responsable: formPrefs.responsable || '',
    fin: getTodayDateValue(),
    estado: 'To Do',
    prompt: '',
    notas: ''
  };
}

function renderCategoryOptions(selectedValue) {
  const normalized = categories.includes(selectedValue) ? selectedValue : '';
  const emptyOption = `<option value=""${normalized===''?' selected':''}></option>`;
  const categoryOptions = categories.map(category =>
    `<option value="${esc(category)}"${normalized===category?' selected':''}>${esc(category)}</option>`
  ).join('');
  return emptyOption + categoryOptions;
}

function bindFormInteractions() {
  const panel = document.getElementById('action-form-panel');
  if (!panel) return;

  panel.addEventListener('keydown', event => {
    if (event.key !== 'Enter') return;
    if (event.shiftKey || event.ctrlKey || event.altKey || event.metaKey) return;

    const targetId = event.target?.id || '';
    if (targetId === 'f-prm' || targetId === 'f-not') return;
    if (event.target instanceof HTMLButtonElement) return;

    event.preventDefault();
    saveAction();
  });
}

  const ac = (document.getElementById('f-ac').value||'').trim();
  if (!ac) { alert('La acción es obligatoria.'); return; }
  const rec = {
    id: editId || nextId,
    accion: ac,
    categoria: document.getElementById('f-cat').value,
    prioridad: document.getElementById('f-pri').value,
    responsable: document.getElementById('f-res').value.trim(),

    estado: document.getElementById('f-est').value,

    notas: document.getElementById('f-not').value.trim()
  };
  if (editId) { const i=actions.findIndex(a=>a.id===editId); if(i>=0) actions[i]=rec; }
  else { nextId++; actions.push(rec); }
  formPrefs = {
    categoria: categories.includes(rec.categoria) ? rec.categoria : '',
    responsable: rec.responsable || ''
  };
  showForm=false; editId=null; saveProject(); render();
}

function fallbackCopy(txt,cb){
  const ta=document.createElement('textarea');ta.value=txt;ta.style.cssText='position:fixed;opacity:0';
  document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
  if(cb)cb();
}
function copyPrompt(id){
  const a=actions.find(x=>x.id===id); if(!a||!a.prompt) return;
  const cb=()=>{const b=document.getElementById('btn-cp');if(b){b.textContent='✓ Copiado';b.classList.add('copied');setTimeout(()=>{b.textContent='📋 Copiar prompt';b.classList.remove('copied');},2000);}};
  if(navigator.clipboard) navigator.clipboard.writeText(a.prompt.trim()).then(cb).catch(()=>fallbackCopy(a.prompt.trim(),cb));
  else fallbackCopy(a.prompt.trim(),cb);
}


// ── Import ───────────────────────────────────────────────────────
function openImportDialog() {
  document.getElementById('import-file')?.click();
}

async function handleImport(event) {
  const input = event.target;
  const file = input.files && input.files[0];
  if (!file) return;

  try {
    const text = await file.text();
    const payload = parseImportedFile(file.name, text);
    applyImportedData(payload, file.name);
  } catch (error) {
    alert(error.message || 'No se pudo importar el archivo.');
  } finally {
    input.value = '';
  }
}

function parseImportedFile(fileName, text) {
  const lower = fileName.toLowerCase();
  if (lower.endsWith('.json')) return parseImportedJSON(text);
  if (lower.endsWith('.csv')) return parseImportedCSV(text);
  throw new Error('Formato no soportado. Usa un archivo JSON o CSV.');
}

function parseImportedJSON(text) {
  let data;
  try {
    data = JSON.parse(text);
  } catch (error) {
    throw new Error('El archivo JSON no es valido.');
  }
  if (!data || !Array.isArray(data.actions)) {
    throw new Error('El JSON no contiene una lista de acciones valida.');
  }
  return {
    project: typeof data.project === 'string' ? data.project.trim() : '',
    categories: Array.isArray(data.categories) ? data.categories : [],
    actions: data.actions
  };
}

function parseImportedCSV(text) {
  const rows = parseCSV(text);
  if (!rows.length) {
    throw new Error('El CSV esta vacio.');
  }

  const headers = rows[0].map(mapCSVHeader);
  if (!headers.includes('accion')) {
    throw new Error('El CSV no contiene una columna ACCION reconocible.');
  }

  const actionsFromCsv = rows.slice(1)
    .filter(row => row.some(value => String(value || '').trim() !== ''))
    .map(row => {
      const record = {};
      headers.forEach((key, index) => {
        if (!key) return;
        record[key] = row[index] || '';
      });
      return record;
    });

  return { project: '', categories: [], actions: actionsFromCsv };
}

function parseCSV(text) {
  const rows = [];
  let row = [];
  let value = '';
  let inQuotes = false;

  for (let index = 0; index < text.length; index++) {
    const char = text[index];

    if (inQuotes) {
      if (char === '"') {
        if (text[index + 1] === '"') {
          value += '"';
          index++;
        } else {
          inQuotes = false;
        }
      } else {
        value += char;
      }
      continue;
    }

    if (char === '"') {
      inQuotes = true;
    } else if (char === ',') {
      row.push(value);
      value = '';
    } else if (char === '\n') {
      row.push(value);
      rows.push(row);
      row = [];
      value = '';
    } else if (char !== '\r') {
      value += char;
    }
  }

  if (value !== '' || row.length) {
    row.push(value);
    rows.push(row);
  }

  while (rows.length && rows[rows.length - 1].length === 1 && rows[rows.length - 1][0] === '') {
    rows.pop();
  }

  return rows;
}

function mapCSVHeader(header) {
  const normalized = String(header || '')
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z]/g, '');

  if (normalized === 'id') return 'id';
  if (normalized === 'accion' || normalized === 'tarea' || normalized === 'acciontarea') return 'accion';
  if (normalized === 'categoria') return 'categoria';
  if (normalized === 'prioridad') return 'prioridad';
  if (normalized === 'estado') return 'estado';
  if (normalized === 'responsable') return 'responsable';
  if (normalized === 'fin' || normalized === 'fechafin') return 'fin';
  if (normalized === 'prompt') return 'prompt';
  if (normalized === 'notas') return 'notas';
  return '';
}

function applyImportedData(payload, fileName) {
  const importedActions = normalizeImportedActions(payload.actions || []);
  const targetProject = project || resolveImportedProjectName(payload.project, fileName);
  const existing = project ? { actions, nextId, categories } : getProjectSnapshot(targetProject);
  const actionLabel = importedActions.length === 1 ? 'accion' : 'acciones';

  if (existing.actions.length > 0) {
    const targetLabel = project ? `el proyecto actual "${targetProject}"` : `el proyecto "${targetProject}"`;
    if (!confirm(`Se van a cargar ${importedActions.length} ${actionLabel} en ${targetLabel} y se sustituira el contenido actual. ¿Continuar?`)) {
      return;
    }
  }

  project = targetProject;
  if (!projectList.includes(targetProject)) {
    projectList.push(targetProject);
    saveRoot();
  }

  actions = importedActions;
  categories = buildImportedCategories(payload.categories || [], importedActions);
  nextId = importedActions.reduce((maxId, action) => Math.max(maxId, action.id), 0) + 1;
  formPrefs = resolveStoredFormPrefs(null, actions, categories);

  filterCat = 'Todos';
  filterEst = 'Todos';
  showForm = false;
  editId = null;
  confirmDel = null;
  modalPrompt = null;
  showCatsMgr = false;

  saveProject();
  render();
  alert(`Importacion completada: ${importedActions.length} ${actionLabel} cargadas en "${targetProject}".`);
}

function resolveImportedProjectName(importedName, fileName) {
  const explicitName = String(importedName || '').trim();
  if (explicitName) return explicitName;

  const baseName = fileName.replace(/\.[^.]+$/, '');
  const match = baseName.match(/^seveng_(.+)_\d{4}-\d{2}-\d{2}$/i);
  if (match && match[1]) return match[1];
  if (baseName) return baseName;
  return 'Proyecto importado';
}

function buildImportedCategories(importedCategories, importedActions) {
  const merged = [...DEFAULT_CATS];
  importedCategories.forEach(category => pushUniqueCategory(merged, category));
  importedActions.forEach(action => pushUniqueCategory(merged, action.categoria));
  return merged;
}

function pushUniqueCategory(list, category) {
  const clean = String(category || '').trim();
  if (clean && !list.includes(clean)) list.push(clean);
}

function normalizeImportedActions(items) {
  const normalized = [];
  const usedIds = new Set();
  let nextAvailableId = 1;

  items.forEach((item, index) => {
    const action = normalizeImportedAction(item);
    if (!action) return;

    let resolvedId = Number.isInteger(action.id) && action.id > 0 && !usedIds.has(action.id)
      ? action.id
      : null;

    if (resolvedId === null) {
      while (usedIds.has(nextAvailableId)) nextAvailableId++;
      resolvedId = nextAvailableId;
    }

    usedIds.add(resolvedId);
    nextAvailableId = Math.max(nextAvailableId, resolvedId + 1);
    normalized.push({ ...action, id: resolvedId });
  });

  return normalized;
}

function normalizeImportedAction(item) {
  if (!item || typeof item !== 'object') return null;

  const accion = String(readImportedField(item, ['accion', 'ACCION', 'Accion', 'Acción']) || '').trim();
  if (!accion) return null;

  const categoria = String(readImportedField(item, ['categoria', 'CATEGORIA', 'Categoria', 'Categoría']) || '').trim();
  const prioridad = String(readImportedField(item, ['prioridad', 'PRIORIDAD', 'Prioridad']) || '').trim();
  const estado = String(readImportedField(item, ['estado', 'ESTADO', 'Estado']) || '').trim();
  const rawId = parseInt(readImportedField(item, ['id', 'ID']), 10);

  return {
    id: Number.isInteger(rawId) ? rawId : 0,
    accion,
    categoria: categoria || DEFAULT_CATS[0],
    prioridad: PRIS.includes(prioridad) ? prioridad : 'Media',
    responsable: String(readImportedField(item, ['responsable', 'RESPONSABLE', 'Responsable']) || '').trim(),
    fin: String(readImportedField(item, ['fin', 'FIN', 'Fecha fin', 'fecha_fin', 'fechaFin']) || '').trim(),
    estado: ESTS.includes(estado) ? estado : 'To Do',
    prompt: String(readImportedField(item, ['prompt', 'PROMPT', 'Prompt']) || '').trim(),
    notas: String(readImportedField(item, ['notas', 'NOTAS', 'Notas']) || '').trim()
  };
}

function readImportedField(item, keys) {
  for (const key of keys) {
    if (Object.prototype.hasOwnProperty.call(item, key) && item[key] != null) {
      return item[key];
    }
  }
  return '';
}


// ── Export ────────────────────────────────────────────────────────
function exportJSON(){
  const d=JSON.stringify({project,exportedAt:new Date().toISOString(),categories,actions},null,2);
  const a=document.createElement('a');a.href='data:application/json;charset=utf-8,'+encodeURIComponent(d);
  a.download=`seveng_${project}_${new Date().toISOString().slice(0,10)}.json`;a.click();
}
function exportCSV(){
  const h='ID,ACCION,CATEGORIA,PRIORIDAD,ESTADO,RESPONSABLE,FIN,PROMPT,NOTAS\n';
  const r=actions.map(a=>[a.id,`"${(a.accion||'').replace(/"/g,'""')}"`,a.categoria,a.prioridad,a.estado,
    `"${(a.responsable||'').replace(/"/g,'""')}"`,a.fin,
    `"${(a.prompt||'').replace(/"/g,'""')}"`,`"${(a.notas||'').replace(/"/g,'""')}"`].join(',')).join('\n');
  const blob=new Blob([h+r],{type:'text/csv'});
  const a2=document.createElement('a');a2.href=URL.createObjectURL(blob);
  a2.download=`seveng_${project}_${new Date().toISOString().slice(0,10)}.csv`;a2.click();
}

render();
